<!DOCTYPE html>
<html lang="en">
    
<head>
    <style>
        @font-face {
            font-family: 'Redaction 50';
            src: url('/fonts/Redaction50-Regular.woff2') format('woff2');   
            font-display: block;
        }

        @font-face {
            font-family: 'Space Grotesk';
            src: url('/fonts/SpaceGrotesk-text.woff2') format('woff2');
            font-display: swap;
        }

        @font-face {
            font-family: 'Space Grotesk Title';
            src: url('/fonts/SpaceGrotesk-title.woff2') format('woff2');
            font-display: block;
        }

        /* Start Header and Main */

        body {
            background-color: #080708;
            width: 100%;
            color: white;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }

        main {
            padding: 20px;
            flex-grow: 1
        }


        .noto-serif {
            font-family: "Noto Serif", serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings:
                "wdth" 100;
        }

        /* Shelf */
        .shelf {
            width: 100%;
            height: 50px;
            border-bottom: #6c6b6b;
            border-width: 0;
            border-bottom-width: 2px;
            border-style: ridge;
        }

        .logo {
            height: 40px;
            padding-top: 5px;
            padding-left: 2px;
            text-decoration: none;
        }

        .logoText {
            font-family: "Space Grotesk Title", sans-serif;
            color: #FFFAFF;
            display: inline;
            padding-right: 5px;
            position: relative;
            bottom: 7px;
        }

        @media screen and (min-width: 500px) {
            .logoText {
                font-size: 36px;
                visibility: visible;
                padding-left: 5px;
            }
        }

        @media screen and (max-width: 500px) {
            .logoText {
                font-size: 27px;
                top: -10px;
                visibility: visible;
                padding-left: 5px;
            }
        }

        @media screen and (max-width: 380px) {
            .logoText {
                font-size: 18px;
                top: -13px;
                visibility: visible;
                padding-left: 0px;
            }
        }

        @media screen and (max-width: 328px) {
            .logoText {
                display: none;
            }
        }

        .resources {
            float: right;
        }

        .shelfButton {
            background-color: #FFFAFF;
            color: #080708;
            padding: 16px;
            font-size: 16px;
            border: none;
            height: 50px;
            float: right;
        }
    </style>

    <link rel="preload" href="/styles/default.css" as="style">
    <link rel="stylesheet" href="/styles/default.css">

    {% if page.url == "/" %}
    <title>DeFlock SF</title>
</head>
{% else %}
<title>{{ page.title }} | DeFlock SF</title>
{% endif %}

{% if page.custom_head %}
{{ page.custom_head }}
{% endif %}

<script>
    window.addEventListener("load", function () {
        (function (w, d, e, u, f, l, n) { w[f] = w[f] || function () { (w[f].q = w[f].q || []).push(arguments);
         }, l = d.createElement(e), l.async = 1, l.src = u, n = d.getElementsByTagName(e)[0], n.parentNode.insertBefore(l, n);
         })(window, document, 'script', 'https://assets.mailerlite.com/js/universal.js', 'ml'); ml('account', '2042076');
    });
</script>
<link rel="icon" href="/favicon.png" sizes="any">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preload" href="/fonts/SpaceGrotesk-title.woff2" as="font" type="font/woff2" crossorigin>
<meta name="description"
    content="{% if page.description %}{{ page.description | xml_escape }}{% else %}{{ site.description | xml_escape }}{% endif %}">
</head>

<body>
    <div class="wrapper">
        <header>
            <div class="shelf ">
                <a href="/resources"><button class="shelfButton">Resources</button></a>
                <a href="/news"><button class="shelfButton">News</button></a>
                <a class="logo" href="/">
                    <img alt="DeFlockSF Logo" class="logo" src="/favicon.svg"></img>
                    <div class="logoText">DeFlock SF</div>
                </a>
            </div>
        </header>
        <main>
            {{ content }}
        </main>
        <footer>
            <div class="footerFade"></div>
            <div class="footerWrapper">
                <a title="Contact" href="/contact"><img
                        alt="Contact Link" class="socials" style="height: 25px; margin-bottom: 7.5px" src="/images/mail.svg"></a>
                <a title="Instagram" href="https://www.instagram.com/deflocksf" target="_blank" rel="noopener noreferrer"> <img
                        alt="Instagram Link" class="socials" src="/images/instagram.svg"></a>
                <a title="TikTok" href="https://www.tiktok.com/@deflocksf" target="_blank" rel="noopener noreferrer"><img
                        alt="TikTok Link" class="socials invert" src="/images/tiktok.svg"></img></a>
                <a title="YouTube" href="https://www.youtube.com/@deflocksf" target="_blank" rel="noopener noreferrer"><img
                        alt="YouTube Link" class="socials" src="/images/youtube.svg"></img></a>
                <a title="GitHub" href="https://github.com/zachary-schwartz/flocksf" target="_blank" rel="noopener noreferrer"><img
                        alt="Github Link" class="socials" src="/images/github.svg"></img></a>
                <br>
                <p>Not associated with Flock Safety, Flock Group Inc, or any public agency.
                    <a class="footer" href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank"
                        rel="noopener noreferrer">CC BY-NC-SA</a>
                </p>
            </div>
        </footer>
    </div>
</body>

</html>
